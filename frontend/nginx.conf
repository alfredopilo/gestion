server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Permitir archivos grandes (backups hasta 500 MB)
    client_max_body_size 500m;
    client_body_timeout 300s;

    # Compresión gzip para reducir tamaño de transferencia ~70-80%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/x-font-ttf
        image/svg+xml;

    # Archivos estáticos (chunks JS/CSS): MIME correcto. Si no existen → 404 (no index.html).
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        types {
            application/javascript js mjs;
            text/css css;
        }
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para el backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Timeouts extendidos para operaciones largas (backup restore, exports)
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # No buffering para uploads grandes (evita ECONNABORTED en backups)
        proxy_request_buffering off;
        proxy_buffering         off;
    }
}

